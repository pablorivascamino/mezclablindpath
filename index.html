<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blind Path no sabe qué mezcla elegir</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #181818;
      --surface:   #1e1e1e;
      --card:      #222222;
      --border:    #313131;
      --accent:    #8a8a8a;
      --accent2:   #5a5a5a;
      --text:      #d4d4d4;
      --muted:     #555555;
      --progress:  #707070;
      --snow:      rgba(210, 210, 210, 0.6);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne Mono', monospace;
      overflow-x: hidden;
    }

    /* ── SNOW CANVAS ── */
    #snow-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 4rem;
      gap: 3rem;
    }

    /* ── TITLE ── */
    .title-block {
      text-align: center;
    }

    .title-block h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 800;
      font-style: normal;
      letter-spacing: -0.01em;
      line-height: 1.2;
      color: var(--text);
      text-shadow: 0 0 40px rgba(150,150,150,0.10);
    }

    .title-block .subtitle {
      margin-top: 0.6rem;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'Syne Mono', monospace;
    }

    /* ── PLAYERS GRID ── */
    .players {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
      width: 100%;
      max-width: 520px;
    }

    /* ── SINGLE PLAYER CARD ── */
    .player {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem 1.6rem 1.4rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .player::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(100,100,100,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .player.active {
      border-color: var(--accent2);
      box-shadow: 0 0 24px rgba(120,120,120,0.10), inset 0 0 32px rgba(100,100,100,0.04);
    }

    /* track number badge */
    .track-num {
      position: absolute;
      top: 1.1rem;
      right: 1.3rem;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: var(--muted);
    }

    /* song title */
    .song-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.1rem;
      padding-right: 3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }

    /* controls row */
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    /* play/pause button */
    .play-btn {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: transparent;
      border: 1.5px solid var(--accent2);
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      outline: none;
    }

    .play-btn:hover {
      background: rgba(120,120,120,0.14);
      border-color: var(--accent);
      transform: scale(1.06);
    }

    .play-btn:active { transform: scale(0.95); }

    .play-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* progress area */
    .progress-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .progress-track {
      position: relative;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: default;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 4px;
      transition: width 0.3s linear;
    }

    .hidden {
      display: none !important;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    /* waveform decoration (static) */
    .wave-decor {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28px;
      opacity: 0.07;
      pointer-events: none;
    }

    /* playing indicator dots */
    .dots {
      display: flex;
      gap: 3px;
      align-items: flex-end;
      height: 14px;
      flex-shrink: 0;
    }
    .dots span {
      display: block;
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      animation: none;
    }
    .dots span:nth-child(1) { height: 6px; }
    .dots span:nth-child(2) { height: 10px; }
    .dots span:nth-child(3) { height: 8px; }
    .dots span:nth-child(4) { height: 13px; }
    .dots span:nth-child(5) { height: 7px; }

    @keyframes bounce {
      0%, 100% { transform: scaleY(0.4); }
      50%       { transform: scaleY(1); }
    }

    .player.active .dots span:nth-child(1) { animation: bounce 0.9s 0.0s ease-in-out infinite; }
    .player.active .dots span:nth-child(2) { animation: bounce 0.9s 0.15s ease-in-out infinite; }
    .player.active .dots span:nth-child(3) { animation: bounce 0.9s 0.30s ease-in-out infinite; }
    .player.active .dots span:nth-child(4) { animation: bounce 0.9s 0.10s ease-in-out infinite; }
    .player.active .dots span:nth-child(5) { animation: bounce 0.9s 0.25s ease-in-out infinite; }

    /* ── FOOTER ── */
    .footer {
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      color: var(--muted);
      text-transform: uppercase;
      opacity: 0.5;
    }
  </style>
</head>
<body>

<canvas id="snow-canvas"></canvas>

<div class="wrapper">

  <div class="title-block">
    <h1>No sabemos qué mezcla<br>elegir para nuestra canción</h1>
    <p class="subtitle">elige una versión para escuchar</p>
  </div>

  <div class="players" id="players-container">

    <!-- Player 1 -->
    <div class="player" data-index="0">
      <span class="track-num"></span>
      <div class="song-title">Versión Don Cangrejo</div>
      <div class="controls">
        <button class="play-btn" aria-label="Play / Pause">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="progress-area">
          <div class="progress-track">
            <div class="progress-fill"></div>
          </div>
          <div class="time-row">
            <span class="current-time">0:00</span>
            <span class="total-time">–:––</span>
          </div>
        </div>
        <div class="dots">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
      <!-- decorative SVG wave -->
      <svg class="wave-decor" viewBox="0 0 520 28" preserveAspectRatio="none">
        <polyline points="0,20 20,14 40,18 60,10 80,16 100,8 120,15 140,9 160,18 180,12 200,20 220,6 240,15 260,10 280,18 300,7 320,14 340,11 360,17 380,9 400,16 420,8 440,15 460,12 480,19 500,8 520,14" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
      </svg>
    </div>

    <!-- Player 2 -->
    <div class="player" data-index="1">
      <span class="track-num"></span>
      <div class="song-title">Versión Arenita</div>
      <div class="controls">
        <button class="play-btn" aria-label="Play / Pause">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="progress-area">
          <div class="progress-track">
            <div class="progress-fill"></div>
          </div>
          <div class="time-row">
            <span class="current-time">0:00</span>
            <span class="total-time">–:––</span>
          </div>
        </div>
        <div class="dots">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
      <svg class="wave-decor" viewBox="0 0 520 28" preserveAspectRatio="none">
        <polyline points="0,15 25,9 50,18 75,6 100,14 125,19 150,8 175,16 200,11 225,20 250,7 275,13 300,18 325,5 350,12 375,17 400,9 425,16 450,11 475,19 500,7 520,13" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
      </svg>
    </div>

    <!-- Player 3 -->
    <div class="player" data-index="2" class="hidden">
      <span class="track-num">TRACK 03</span>
      <div class="song-title">Mix C — Tercera versión</div>
      <div class="controls">
        <button class="play-btn" aria-label="Play / Pause">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="progress-area">
          <div class="progress-track">
            <div class="progress-fill"></div>
          </div>
          <div class="time-row">
            <span class="current-time">0:00</span>
            <span class="total-time">–:––</span>
          </div>
        </div>
        <div class="dots">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
      <svg class="wave-decor" viewBox="0 0 520 28" preserveAspectRatio="none">
        <polyline points="0,12 30,18 60,8 90,16 120,5 150,14 180,20 210,9 240,17 270,12 300,19 330,6 360,15 390,10 420,18 450,7 480,14 520,10" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
      </svg>
    </div>

  </div>

  <p class="footer">© todos los derechos reservados</p>
</div>

<script>
  /* ── SNOW PARTICLES ── */
  (function () {
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, flakes = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function randomFlake() {
      return {
        x:    Math.random() * W,
        y:    Math.random() * H - H,
        r:    Math.random() * 2.5 + 0.8,
        speed:Math.random() * 0.8 + 0.3,
        drift:Math.random() * 0.4 - 0.2,
        alpha:Math.random() * 0.5 + 0.25,
        swing:Math.random() * Math.PI * 2,
        swingSpeed: Math.random() * 0.02 + 0.005,
      };
    }

    function init() {
      resize();
      flakes = Array.from({ length: 160 }, randomFlake);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (const f of flakes) {
        f.swing += f.swingSpeed;
        f.x += f.drift + Math.sin(f.swing) * 0.35;
        f.y += f.speed;

        if (f.y > H + 10) { Object.assign(f, randomFlake()); f.y = -10; }
        if (f.x > W + 10) f.x = -10;
        if (f.x < -10)    f.x = W + 10;

        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(210,210,210,${f.alpha})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    init();
    draw();
  })();

  /* ── SHUFFLE FIRST TWO PLAYERS ── */
  (function () {
    const container = document.getElementById('players-container');
    const allCards  = Array.from(container.children);
    // Randomly swap the first two cards (50/50 chance)
    if (Math.random() < 0.5) {
      container.insertBefore(allCards[1], allCards[0]);
    }
  })();

  /* ── AUDIO PLAYERS ── */
  const TRACKS = [
    { src: 'assets/track01.mp3', title: 'Mix A — Primera versión' },
    { src: 'assets/track02.mp3', title: 'Mix B — Segunda versión' },
    { src: 'assets/track03.mp3', title: 'Mix C — Tercera versión' },
  ];

  const PLAY_ICON  = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
  const PAUSE_ICON = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

  function fmt(s) {
    if (isNaN(s) || !isFinite(s)) return '–:––';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  const cards = document.querySelectorAll('.player');
  const audios = [];

  cards.forEach((card, i) => {
    const audio = new Audio(TRACKS[i].src);
    audio.volume = 1;
    audios.push(audio);

    const btn      = card.querySelector('.play-btn');
    const fill     = card.querySelector('.progress-fill');
    const current  = card.querySelector('.current-time');
    const total    = card.querySelector('.total-time');

    // Update progress
    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      fill.style.width = pct + '%';
      current.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
      total.textContent = fmt(audio.duration);
    });

    audio.addEventListener('ended', () => {
      card.classList.remove('active');
      btn.innerHTML = PLAY_ICON;
    });

    btn.addEventListener('click', () => {
      const isPlaying = !audio.paused;

      // Pause all others
      audios.forEach((a, j) => {
        if (j !== i) {
          a.pause();
          cards[j].classList.remove('active');
          cards[j].querySelector('.play-btn').innerHTML = PLAY_ICON;
        }
      });

      if (isPlaying) {
        audio.pause();
        card.classList.remove('active');
        btn.innerHTML = PLAY_ICON;
      } else {
        audio.play();
        card.classList.add('active');
        btn.innerHTML = PAUSE_ICON;
      }
    });
  });
</script>
</body>
</html>
